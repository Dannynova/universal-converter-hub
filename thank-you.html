<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You – Universal Converter Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9edf2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            padding: 40px 32px;
            text-align: center;
            transition: transform 0.2s;
        }
        .card:hover {
            transform: scale(1.01);
        }
        .checkmark {
            font-size: 72px;
            margin-bottom: 20px;
            display: inline-block;
            animation: bounce 0.6s ease;
        }
        @keyframes bounce {
            0% { transform: scale(0.8); opacity: 0; }
            80% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
        h1 {
            font-size: 28px;
            margin-bottom: 16px;
            color: #1e293b;
        }
        p {
            font-size: 16px;
            line-height: 1.5;
            color: #334155;
            margin-bottom: 24px;
        }
        .redirect-message {
            background: #f1f5f9;
            border-radius: 40px;
            padding: 12px;
            font-size: 14px;
            color: #2563eb;
            margin-top: 20px;
        }
        .btn {
            display: inline-block;
            background: #2563eb;
            color: white;
            text-decoration: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 600;
            transition: background 0.2s;
            margin-top: 16px;
        }
        .btn:hover {
            background: #1d4ed8;
        }
        footer {
            margin-top: 24px;
            font-size: 12px;
            color: #64748b;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="checkmark">❤️</div>
        <h1>Thank You for Your Support!</h1>
        <p>Your donation helps keep the Universal Converter Hub running and improving. We truly appreciate you.</p>
        <div class="redirect-message">
            🔄 Redirecting you back to the converter in <span id="countdown">5</span> seconds...
        </div>
        <a href="https://dannynova.github.io/universal-converter-hub" class="btn">Return now</a>
        <footer>Universal Converter Hub – made with passion</footer>
    </div>

    <script>
        let seconds = 5;
        const countdownSpan = document.getElementById('countdown');
        const timer = setInterval(() => {
            seconds--;
            countdownSpan.textContent = seconds;
            if (seconds <= 0) {
                clearInterval(timer);
                window.location.href = 'https://dannynova.github.io/universal-converter-hub';
            }
        }, 1000);
    </script>
</body>
</html>
